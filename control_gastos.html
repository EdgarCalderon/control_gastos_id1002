<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Control de Gastos Hormiga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1820 100%);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            color: #333;
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding-bottom: 100px;
        }

        .container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #0052cc;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #333;
            border-bottom: 2px solid #0052cc;
            padding-bottom: 8px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            width: 100%;
        }

        .input-group input,
        .input-group select {
            min-width: 100%;
        }

        input[type="number"],
        input[type="text"],
        select {
            flex: 1;
            min-width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 36px;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
        }

        button {
            padding: 12px 20px;
            background: #0052cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        button:active {
            opacity: 0.85;
            transform: scale(0.98);
        }

        @media (hover: hover) {
            button:hover {
                background: #0043a3;
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(0, 82, 204, 0.4);
            }
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-left: 8px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-box.warning {
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-name {
            font-weight: 600;
            flex: 1;
        }

        .category-amount {
            font-weight: 700;
            color: #0052cc;
            margin-right: 12px;
            min-width: 60px;
            text-align: right;
        }

        .ant-badge {
            background: #ffd700;
            color: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-left: 4px solid #0052cc;
            background: #f0f5ff;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .expense-item.ant {
            border-left-color: #ffd700;
            background: #fffef0;
        }

        .expense-info {
            flex: 1;
        }

        .expense-cat {
            font-weight: 600;
            color: #333;
        }

        .expense-desc {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .expense-date {
            font-size: 11px;
            color: #bbb;
            margin-top: 2px;
        }

        .expense-amount {
            font-weight: 700;
            color: #0052cc;
            margin-right: 8px;
            min-width: 60px;
            text-align: right;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
            min-height: 40px;
            min-width: 40px;
        }

        .delete-btn:active {
            background: #ff3838;
            transform: scale(0.95);
        }

        @media (hover: hover) {
            .delete-btn:hover {
                background: #ff3838;
            }
        }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .suggestions {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .suggestions h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .suggestion-item {
            padding: 8px 0;
            font-size: 14px;
            line-height: 1.6;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0052cc 0%, #003d99 100%);
            transition: width 0.3s;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 2px solid #eee;
            width: 100%;
        }

        .tab {
            padding: 12px 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
            word-break: break-word;
            line-height: 1.2;
        }

        .tab.active {
            color: #0052cc;
            border-bottom-color: #0052cc;
            background: rgba(0, 82, 204, 0.03);
        }

        @media (hover: hover) {
            .tab:hover {
                background: rgba(0, 82, 204, 0.05);
            }
        }

        .tab:active {
            background: rgba(0, 82, 204, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .export-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .export-buttons button {
            flex: 1;
        }

        .data-button {
            position: fixed;
            bottom: 20px;
            right: 16px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 82, 204, 0.4);
            transition: all 0.15s ease;
            z-index: 100;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            min-width: 60px;
        }

        .data-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 82, 204, 0.3);
        }

        @media (hover: hover) {
            .data-button:hover {
                transform: scale(1.08);
                box-shadow: 0 6px 24px rgba(0, 82, 204, 0.6);
            }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content {
            background: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 0;
            animation: slideUp 0.3s ease-out;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h2 {
            font-size: 18px;
            margin: 0;
            color: #333;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        .close-modal:active {
            color: #333;
            opacity: 0.8;
        }

        @media (hover: hover) {
            .close-modal:hover {
                color: #333;
            }
        }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .btn-export {
            padding: 14px 20px;
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .btn-export:active {
            opacity: 0.85;
            transform: scale(0.98);
        }

        @media (hover: hover) {
            .btn-export:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(0, 82, 204, 0.4);
            }
        }

        .btn-danger {
            padding: 14px 20px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .btn-danger:active {
            opacity: 0.85;
            transform: scale(0.98);
        }

        @media (hover: hover) {
            .btn-danger:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .confirmation-dialog {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .confirmation-dialog h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #333;
        }

        .confirmation-dialog p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .confirmation-buttons {
            display: flex;
            gap: 12px;
        }

        .confirmation-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-confirm {
            background: #ff4757;
            color: white;
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                width: 100%;
                max-width: 100%;
            }

            .card {
                padding: 16px;
                margin-bottom: 12px;
            }

            header {
                padding: 16px;
                margin-bottom: 12px;
            }

            h1 {
                font-size: 20px;
            }

            .subtitle {
                font-size: 12px;
            }

            .stats {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .input-group {
                flex-direction: column;
                gap: 10px;
            }

            input[type="number"],
            input[type="text"],
            select,
            button {
                width: 100%;
                min-width: 100%;
                font-size: 16px;
            }

            .card h2 {
                font-size: 16px;
            }

            .tab {
                padding: 10px 12px;
                font-size: 12px;
            }

            .expense-item {
                padding: 10px;
            }

            .delete-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .data-button {
                width: 56px;
                height: 56px;
                font-size: 22px;
                bottom: 16px;
                right: 12px;
            }

            .modal-body {
                padding: 16px;
            }

            .btn-export,
            .btn-danger {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Control de Gastos</h1>
            <p class="subtitle">Identifica gastos hormiga y ahorra dinero</p>
        </header>

        <div class="card">
            <h2>➕ Registrar gasto</h2>
            <div class="input-group">
                <input type="number" id="amount" placeholder="Monto ($)" step="0.01" min="0">
                <select id="category">
                    <option value="Café">☕ Café</option>
                    <option value="Comida rápida">🍔 Comida rápida</option>
                    <option value="Apps">📱 Suscripciones</option>
                    <option value="Comidas fuera">🍽️ Comidas fuera de casa</option>
                    <option value="Golosinas">🍬 Golosinas</option>
                    <option value="Transporte">🚕 Transporte</option>
                    <option value="Entretenimiento">🎬 Entretenimiento</option>
                    <option value="Apuestas">🎲 Apuestas en línea</option>
                    <option value="Propinas">💵 Propinas</option>
                    <option value="Otro">📌 Otro</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="description" placeholder="Descripción (ej: Venti Starbucks)">
                <button onclick="addExpense()">Agregar</button>
            </div>
        </div>

        <div style="background: white; padding: 12px 16px; margin: 0 0 16px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px;">
            <button onclick="previousMonthGlobal()" style="background: #0052cc; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px;">← Anterior</button>
            <div style="text-align: center; flex: 1;">
                <div id="globalMonthDisplay" style="font-weight: 700; font-size: 14px; color: #333;">Febrero 2026</div>
                <div style="font-size: 11px; color: #999;">Filtrando datos...</div>
            </div>
            <div style="display: flex; gap: 6px;">
                <button onclick="toggleViewAll()" id="viewAllBtn" style="background: #f0f0f0; color: #333; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px;">Ver todo</button>
                <button onclick="nextMonthGlobal()" style="background: #0052cc; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px;">Siguiente →</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total gastado</div>
                <div class="stat-value" id="totalSpent">$0</div>
            </div>
            <div class="stat-box warning">
                <div class="stat-label">Gastos hormiga</div>
                <div class="stat-value" id="antSpent">$0</div>
            </div>
        </div>

        <div class="card" id="suggestionsCard" style="display: none;">
            <div class="suggestions" id="suggestionsContent"></div>
        </div>

        <div class="card">
            <h2>📊 Análisis</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('gráfico')">Gráfico</button>
                <button class="tab" onclick="switchTab('categorías')">Por categoría</button>
                <button class="tab" onclick="switchTab('meses')">Por mes</button>
                <button class="tab" onclick="switchTab('lista')">Historial</button>
            </div>

            <div id="gráfico" class="tab-content active">
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div id="categorías" class="tab-content">
                <div id="categoryBreakdown"></div>
            </div>

            <div id="meses" class="tab-content">
                <div style="padding: 12px 0 16px 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px;">
                        <button onclick="previousMonth()" style="background: #0052cc; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer;">← Anterior</button>
                        <div style="text-align: center; flex: 1;">
                            <div id="currentMonth" style="font-weight: 700; font-size: 16px; color: #333;">Febrero 2026</div>
                            <div id="monthYearSelector" style="font-size: 12px; color: #999;"></div>
                        </div>
                        <button onclick="nextMonth()" style="background: #0052cc; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer;">Siguiente →</button>
                    </div>
                </div>
                <div id="monthlyBreakdown"></div>
            </div>

            <div id="lista" class="tab-content">
                <div id="expenseList"></div>
            </div>
        </div>

        <button class="data-button" onclick="openDataModal()">⚙️</button>
    </div>

    <!-- Modal de Datos -->
    <div id="dataModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💾 Gestionar datos</h2>
                <button class="close-modal" onclick="closeDataModal()">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-info">Opciones para tu información</p>
                <button class="btn-export" onclick="exportCSV()">📥 Descargar datos (CSV)</button>
                <button class="btn-danger" onclick="confirmClearData()">🗑️ Borrar TODO</button>
            </div>
        </div>
    </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
        let chart = null;
        
        // Variables para control de meses
        const today = new Date();
        let selectedMonth = today.getMonth(); // 0-11
        let selectedYear = today.getFullYear();
        let isViewingAll = false; // Mostrar todos los meses o solo el seleccionado
        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                           'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        function getWeekInfo(date = new Date()) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Ajusta al lunes
            const monday = new Date(d.setDate(diff));
            const sunday = new Date(monday);
            sunday.setDate(sunday.getDate() + 6);
            
            const weekStart = monday.toLocaleDateString('es-MX');
            const weekEnd = sunday.toLocaleDateString('es-MX');
            const weekKey = monday.toISOString().split('T')[0]; // YYYY-MM-DD del lunes
            
            return { weekStart, weekEnd, weekKey, monday, sunday };
        }

        function getDayName(date) {
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            return days[new Date(date).getDay()];
        }

        function getFilteredExpenses() {
            if (isViewingAll) {
                return expenses;
            }
            
            // Filtrar por mes seleccionado
            return expenses.filter(e => {
                try {
                    const parts = e.date.split('/');
                    const expenseDate = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
                    return expenseDate.getMonth() === selectedMonth && expenseDate.getFullYear() === selectedYear;
                } catch (err) {
                    return false;
                }
            });
        }

        function updateMonthDisplay() {
            const display = isViewingAll ? 'Todos los meses' : `${monthNames[selectedMonth]} ${selectedYear}`;
            document.getElementById('globalMonthDisplay').textContent = display;
            
            // Cambiar estilo del botón Ver todo
            const viewAllBtn = document.getElementById('viewAllBtn');
            if (isViewingAll) {
                viewAllBtn.style.background = '#0052cc';
                viewAllBtn.style.color = 'white';
            } else {
                viewAllBtn.style.background = '#f0f0f0';
                viewAllBtn.style.color = '#333';
            }
            
            render();
        }

        function previousMonthGlobal() {
            isViewingAll = false;
            selectedMonth--;
            if (selectedMonth < 0) {
                selectedMonth = 11;
                selectedYear--;
            }
            updateMonthDisplay();
        }

        function nextMonthGlobal() {
            isViewingAll = false;
            selectedMonth++;
            if (selectedMonth > 11) {
                selectedMonth = 0;
                selectedYear++;
            }
            updateMonthDisplay();
        }

        function toggleViewAll() {
            isViewingAll = !isViewingAll;
            updateMonthDisplay();
        }

        function addExpense() {
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            if (!amount || amount <= 0) {
                alert('Por favor ingresa un monto válido');
                return;
            }

            const today = new Date();
            const dayName = getDayName(today);
            const weekInfo = getWeekInfo(today);

            expenses.unshift({
                id: Date.now(),
                amount,
                category,
                description,
                date: today.toLocaleDateString('es-MX'),
                dayName,
                weekKey: weekInfo.weekKey,
                weekStart: weekInfo.weekStart,
                weekEnd: weekInfo.weekEnd
            });

            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            saveData();
            
            // Mostrar confirmación visual
            const confirmationMsg = document.createElement('div');
            confirmationMsg.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #26de81;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-weight: 600;
                z-index: 9999;
                animation: slideDown 0.3s ease;
                box-shadow: 0 4px 12px rgba(38, 222, 129, 0.4);
            `;
            confirmationMsg.textContent = `✓ Gasto de $${amount.toFixed(2)} agregado`;
            document.body.appendChild(confirmationMsg);
            
            // Cambiar a pestaña de gráfico
            setTimeout(() => {
                switchTab('gráfico');
                // Scroll hacia arriba
                window.scrollTo({ top: 0, behavior: 'smooth' });
                // Eliminar mensaje de confirmación
                confirmationMsg.remove();
            }, 800);
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            saveData();
        }

        function saveData() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            render();
        }

        function render() {
            renderStats();
            renderSuggestions();
            renderChart();
            renderCategories();
            renderMonths();
            renderList();
        }

        function renderStats() {
            const filtered = getFilteredExpenses();
            const total = Math.round(filtered.reduce((sum, e) => sum + e.amount, 0) * 100) / 100;
            // Hormiga: todo excepto Transporte, Apps, Comidas fuera
            const antTotal = Math.round(filtered.filter(e => 
                e.category !== 'Transporte' && 
                e.category !== 'Apps' && 
                e.category !== 'Comidas fuera'
            ).reduce((sum, e) => sum + e.amount, 0) * 100) / 100;

            document.getElementById('totalSpent').textContent = '$' + total.toFixed(2);
            document.getElementById('antSpent').textContent = '$' + antTotal.toFixed(2);
        }

        function renderSuggestions() {
            const filtered = getFilteredExpenses();
            if (filtered.length === 0) {
                document.getElementById('suggestionsCard').style.display = 'none';
                return;
            }

            const total = filtered.reduce((sum, e) => sum + e.amount, 0);
            // Hormiga: todo excepto Transporte, Apps, Comidas fuera
            const antTotal = filtered.filter(e => 
                e.category !== 'Transporte' && 
                e.category !== 'Apps' && 
                e.category !== 'Comidas fuera'
            ).reduce((sum, e) => sum + e.amount, 0);
            
            const mealOutTotal = filtered.filter(e => e.category === 'Comidas fuera').reduce((sum, e) => sum + e.amount, 0);
            const mealOutCount = filtered.filter(e => e.category === 'Comidas fuera').length;
            const antPercent = ((antTotal / total) * 100).toFixed(1);

            const byCategory = {};
            filtered.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            const topCategory = Object.entries(byCategory).sort((a, b) => b[1] - a[1])[0];
            const topCategoryPercent = ((topCategory[1] / total) * 100).toFixed(1);

            let suggestions = [];

            if (antPercent > 20) {
                suggestions.push(`🐜 <strong>ALERTA GASTOS HORMIGA:</strong> ${antPercent}% de tu dinero va en gastos innecesarios (Café, Snacks, Golosinas, etc). Estos se acumulan rápido. Intenta reducirlos.`);
            }

            if (mealOutCount > 0) {
                suggestions.push(`🍽️ <strong>Comidas fuera de casa:</strong> Gastaste $${mealOutTotal.toFixed(2)} en ${mealOutCount} ocasión(es). Si te preparas la comida en casa, podrías ahorrar significativamente.`);
            }

            if (topCategoryPercent > 30 && topCategory[0] !== 'Transporte' && topCategory[0] !== 'Apps') {
                suggestions.push(`📌 <strong>${topCategory[0]} es tu mayor gasto:</strong> ${topCategoryPercent}% de todo. Intenta reducirlo 20% y tendrás $${(topCategory[1] * 0.2).toFixed(2)} extra.`);
            }

            if (filtered.filter(e => e.category === 'Café').length > 5) {
                const coffeeTotal = filtered.filter(e => e.category === 'Café').reduce((sum, e) => sum + e.amount, 0);
                suggestions.push(`☕ <strong>Hábito de café detectado:</strong> Gastas $${coffeeTotal.toFixed(2)}. ¿Y si haces café en casa? Ahorras ~70%.`);
            }

            if (filtered.filter(e => e.category === 'Apuestas').length > 0) {
                const betsTotal = filtered.filter(e => e.category === 'Apuestas').reduce((sum, e) => sum + e.amount, 0);
                const betsCount = filtered.filter(e => e.category === 'Apuestas').length;
                const betsPercent = ((betsTotal / total) * 100).toFixed(1);
                suggestions.push(`🎲 <strong>¡ALERTA APUESTAS!</strong> Has gastado $${betsTotal.toFixed(2)} en ${betsCount} apuestas (${betsPercent}% de tu total). Esto es un gasto de alto riesgo. Considera detenerte completamente.`);
            }

            if (filtered.filter(e => e.category === 'Golosinas').length > 5) {
                const candyTotal = filtered.filter(e => e.category === 'Golosinas').reduce((sum, e) => sum + e.amount, 0);
                suggestions.push(`🍬 <strong>Golosinas frecuentes:</strong> Gastas $${candyTotal.toFixed(2)} en dulces. Ahorrarías mucho reduciéndolas a 1-2 veces por semana.`);
            }

            if (filtered.filter(e => e.category === 'Propinas').length > 0) {
                const tipsTotal = filtered.filter(e => e.category === 'Propinas').reduce((sum, e) => sum + e.amount, 0);
                const tipsPercent = ((tipsTotal / total) * 100).toFixed(1);
                if (tipsPercent > 10) {
                    suggestions.push(`💵 <strong>Propinas elevadas:</strong> ${tipsPercent}% de tu gasto total ($${tipsTotal.toFixed(2)}). Revisa si todas son necesarias.`);
                }
            }

            if (suggestions.length > 0) {
                document.getElementById('suggestionsCard').style.display = 'block';
                document.getElementById('suggestionsContent').innerHTML = suggestions
                    .map(s => `<div class="suggestion-item">💡 ${s}</div>`)
                    .join('');
            } else {
                document.getElementById('suggestionsCard').style.display = 'none';
            }
        }

        function renderChart() {
            const filtered = getFilteredExpenses();
            const byCategory = {};
            filtered.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            const chartContainer = document.getElementById('gráfico');
            if (!chartContainer) return;
            
            if (chart) {
                try {
                    chart.destroy();
                } catch (e) {
                    console.log('Error destruyendo gráfico anterior');
                }
                chart = null;
            }

            if (Object.keys(byCategory).length === 0) {
                chartContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>Agrega gastos para ver el gráfico</p></div>';
                return;
            }

            // Restaurar el canvas si no existe
            chartContainer.innerHTML = '<div class="chart-container"><canvas id="categoryChart"></canvas></div>';
            const ctx = document.getElementById('categoryChart');
            
            if (!ctx) {
                console.error('No se pudo encontrar el canvas');
                return;
            }

            const colors = [
                '#0052cc', '#ff4757', '#ffa502', '#26de81', '#fc5a8d', 
                '#1abc9c', '#3498db', '#9b59b6', '#e74c3c', '#f39c12'
            ];

            try {
                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(byCategory),
                        datasets: [{
                            data: Object.values(byCategory),
                            backgroundColor: colors,
                            borderColor: 'white',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    font: { size: 12 },
                                    padding: 15,
                                    usePointStyle: true
                                }
                            }
                        }
                    }
                });
            } catch (err) {
                console.error('Error creando gráfico:', err);
                chartContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Error al cargar el gráfico</p></div>';
            }
        }

        function renderCategories() {
            const filtered = getFilteredExpenses();
            const byCategory = {};
            const total = filtered.reduce((sum, e) => sum + e.amount, 0);
            
            // Agrupar gastos por categoría y luego por semana
            filtered.forEach(e => {
                if (!byCategory[e.category]) {
                    byCategory[e.category] = {};
                }
                const weekKey = e.weekKey || 'sin-semana';
                if (!byCategory[e.category][weekKey]) {
                    byCategory[e.category][weekKey] = {
                        total: 0,
                        weekStart: e.weekStart,
                        weekEnd: e.weekEnd,
                        expenses: []
                    };
                }
                byCategory[e.category][weekKey].total += e.amount;
                byCategory[e.category][weekKey].expenses.push(e);
            });

            if (total === 0) {
                document.getElementById('categoryBreakdown').innerHTML = '<div class="empty-state"><p>Sin categorías registradas</p></div>';
                return;
            }

            const sorted = Object.entries(byCategory)
                .sort((a, b) => {
                    // Suma total por categoría
                    const totalA = Object.values(a[1]).reduce((sum, w) => sum + w.total, 0);
                    const totalB = Object.values(b[1]).reduce((sum, w) => sum + w.total, 0);
                    return totalB - totalA;
                })
                .map(([cat, weeks]) => {
                    const categoryTotal = Object.values(weeks).reduce((sum, w) => sum + w.total, 0);
                    const rounded = Math.round(categoryTotal * 100) / 100;
                    const pct = Math.round((categoryTotal / total) * 100);
                    const uniqueId = `cat-${cat.replace(/\s+/g, '-')}`;
                    
                    // Ordenar semanas de más reciente a más antigua
                    const sortedWeeks = Object.entries(weeks)
                        .sort((a, b) => {
                            if (a[0] === 'sin-semana') return 1;
                            if (b[0] === 'sin-semana') return -1;
                            return new Date(b[1].weekStart) - new Date(a[1].weekStart);
                        });
                    
                    return `
                        <div style="background: white; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #0052cc; overflow: hidden;">
                            <div style="padding: 14px; cursor: pointer;" onclick="toggleCategory('${uniqueId}')">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
                                        <span style="font-weight: 600; color: #333;">${cat}</span>
                                        <span style="font-size: 12px; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; color: #666;">${sortedWeeks.reduce((sum, [_, w]) => sum + w.expenses.length, 0)} gasto${sortedWeeks.reduce((sum, [_, w]) => sum + w.expenses.length, 0) !== 1 ? 's' : ''}</span>
                                    </div>
                                    <span style="color: #0052cc; font-weight: 700; text-align: right;">$${rounded.toFixed(2)} <span style="color: #999; font-weight: 400;">(${pct}%)</span></span>
                                </div>
                                <div style="background: #f0f0f0; height: 8px; border-radius: 4px; overflow: hidden;">
                                    <div style="background: linear-gradient(90deg, #0052cc, #003d99); height: 100%; width: ${pct}%; border-radius: 4px;"></div>
                                </div>
                            </div>
                            
                            <div id="${uniqueId}" style="display: none; background: #fafafa; padding: 0; border-top: 1px solid #eee;">
                                ${sortedWeeks.map(([weekKey, weekData]) => {
                                    const weekUniqueId = `${uniqueId}-${weekKey}`;
                                    const weekDisplay = weekKey === 'sin-semana' ? 'Sin información de semana' : `${weekData.weekStart} al ${weekData.weekEnd}`;
                                    const weekTotal = Math.round(weekData.total * 100) / 100;
                                    
                                    // Agrupar por día dentro de la semana
                                    const byDay = {};
                                    weekData.expenses.forEach(e => {
                                        if (!byDay[e.date]) {
                                            byDay[e.date] = {
                                                dayName: e.dayName,
                                                total: 0,
                                                expenses: []
                                            };
                                        }
                                        byDay[e.date].total += e.amount;
                                        byDay[e.date].expenses.push(e);
                                    });
                                    
                                    return `
                                        <div style="border-bottom: 1px solid #eee;">
                                            <div style="padding: 10px 14px; cursor: pointer; background: #f5f5f5; display: flex; justify-content: space-between; align-items: center;" onclick="toggleWeek('${weekUniqueId}')">
                                                <span style="font-size: 13px; font-weight: 600; color: #333;">📅 ${weekDisplay}</span>
                                                <span style="font-size: 13px; font-weight: 700; color: #0052cc;">$${weekTotal.toFixed(2)}</span>
                                            </div>
                                            <div id="${weekUniqueId}" style="display: none; padding: 0;">
                                                ${Object.entries(byDay).sort((a, b) => new Date(b[0]) - new Date(a[0])).map(([date, dayData]) => {
                                                    const dayTotal = Math.round(dayData.total * 100) / 100;
                                                    const dayUniqueId = `${weekUniqueId}-${date}`;
                                                    
                                                    return `
                                                        <div style="padding: 0; border-left: 1px solid #ddd; margin-left: 10px;">
                                                            <div style="padding: 8px 12px; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="toggleDay('${dayUniqueId}')">
                                                                <span style="font-size: 12px; font-weight: 600; color: #555;">📅 ${dayData.dayName || ''} • ${date}</span>
                                                                <span style="font-size: 12px; font-weight: 600; color: #0052cc;">$${dayTotal.toFixed(2)}</span>
                                                            </div>
                                                            <div id="${dayUniqueId}" style="display: none; padding: 0;">
                                                                ${dayData.expenses.map(e => {
                                                                    let itemStyle = 'style="border-left: 3px solid #ddd; background: white;"';
                                                                    if (e.category === 'Comidas fuera') {
                                                                        itemStyle = 'style="border-left: 3px solid #ffa502; background: #fff5e6;"';
                                                                    } else if (e.category !== 'Transporte' && e.category !== 'Apps') {
                                                                        itemStyle = 'style="border-left: 3px solid #ffd700; background: #fffef0;"';
                                                                    }
                                                                    
                                                                    return `
                                                                        <div ${itemStyle} style="padding: 10px 12px; margin: 0; border-radius: 0; font-size: 12px;">
                                                                            <div style="display: flex; justify-content: space-between; margin-bottom: 2px;">
                                                                                <span style="font-weight: 600; color: #333;">${e.description || '(sin descripción)'}</span>
                                                                                <span style="color: #0052cc; font-weight: 700;">$${e.amount.toFixed(2)}</span>
                                                                            </div>
                                                                        </div>
                                                                    `;
                                                                }).join('')}
                                                            </div>
                                                        </div>
                                                    `;
                                                }).join('')}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('');

            document.getElementById('categoryBreakdown').innerHTML = sorted;
        }

        function toggleCategory(categoryId) {
            const elem = document.getElementById(categoryId);
            if (elem.style.display === 'none') {
                elem.style.display = 'block';
            } else {
                elem.style.display = 'none';
            }
        }

        function toggleWeek(weekId) {
            const elem = document.getElementById(weekId);
            if (elem.style.display === 'none') {
                elem.style.display = 'block';
            } else {
                elem.style.display = 'none';
            }
        }

        function toggleDay(dayId) {
            const elem = document.getElementById(dayId);
            if (elem.style.display === 'none') {
                elem.style.display = 'block';
            } else {
                elem.style.display = 'none';
            }
        }

        function renderList() {
            const filtered = getFilteredExpenses();
            if (filtered.length === 0) {
                document.getElementById('expenseList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>Sin gastos registrados</p></div>';
                return;
            }

            const list = filtered.map(e => {
                let marcador = '';
                let isAnt = '';
                
                // Hormiga: todo excepto Transporte, Apps, Comidas fuera
                if (e.category !== 'Transporte' && e.category !== 'Apps' && e.category !== 'Comidas fuera') {
                    marcador = '🐜';
                    isAnt = ' ant';
                }
                // Comidas fuera: tiene su propio marcador
                else if (e.category === 'Comidas fuera') {
                    marcador = '🍽️';
                }
                
                let dayName = e.dayName;
                
                if (!dayName) {
                    try {
                        const parts = e.date.split('/');
                        const dateObj = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
                        dayName = getDayName(dateObj);
                    } catch (err) {
                        dayName = '';
                    }
                }
                
                return `
                    <div class="expense-item${isAnt}">
                        <div class="expense-info">
                            <div class="expense-cat">${e.category} ${marcador}</div>
                            ${e.description ? `<div class="expense-desc">${e.description}</div>` : ''}
                            <div class="expense-date">${dayName ? dayName + ' • ' : ''}${e.date}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="expense-amount">$${e.amount.toFixed(2)}</div>
                            <button class="delete-btn" onclick="deleteExpense(${e.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('expenseList').innerHTML = list;
        }

        function renderWeekly() {
            if (expenses.length === 0) {
                document.getElementById('weeklyBreakdown').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><p>Sin gastos para analizar por semana</p></div>';
                return;
            }

            // Agrupar gastos por semana
            const byWeek = {};
            expenses.forEach(e => {
                let weekKey = e.weekKey;
                let weekStart = e.weekStart;
                let weekEnd = e.weekEnd;
                
                // Si no tiene información de semana (datos antiguos), calcularla
                if (!weekKey) {
                    try {
                        const parts = e.date.split('/');
                        const dateObj = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
                        const weekInfo = getWeekInfo(dateObj);
                        weekKey = weekInfo.weekKey;
                        weekStart = weekInfo.weekStart;
                        weekEnd = weekInfo.weekEnd;
                    } catch (err) {
                        console.warn('Error procesando fecha:', e.date);
                        return;
                    }
                }
                
                if (!byWeek[weekKey]) {
                    byWeek[weekKey] = {
                        weekStart: weekStart,
                        weekEnd: weekEnd,
                        total: 0,
                        expenses: [],
                        categories: {}
                    };
                }
                byWeek[weekKey].total += e.amount;
                byWeek[weekKey].expenses.push(e);
                byWeek[weekKey].categories[e.category] = (byWeek[weekKey].categories[e.category] || 0) + e.amount;
            });

            // Ordenar semanas de más reciente a más antigua
            const sortedWeeks = Object.entries(byWeek)
                .sort((a, b) => new Date(b[0]) - new Date(a[0]));

            let html = '';

            sortedWeeks.forEach(([weekKey, weekData]) => {
                const antCount = weekData.expenses.filter(e => e.category !== 'Transporte' && e.category !== 'Apps' && e.category !== 'Comidas fuera').length;
                const antTotal = weekData.expenses.filter(e => e.category !== 'Transporte' && e.category !== 'Apps' && e.category !== 'Comidas fuera').reduce((sum, e) => sum + e.amount, 0);
                const maxCategory = Object.entries(weekData.categories).sort((a, b) => b[1] - a[1])[0];
                const weekAvg = (weekData.total / 7).toFixed(2);

                let suggestions = [];
                
                if (weekData.total > 0 && antTotal / weekData.total > 0.15) {
                    suggestions.push(`🐜 Gastos innecesarios: $${antTotal.toFixed(2)} (${((antTotal/weekData.total)*100).toFixed(1)}%). Estos se acumulan rápido, intenta reducirlos.`);
                }
                
                if (maxCategory && weekData.total > 0 && (maxCategory[1] / weekData.total) > 0.35) {
                    suggestions.push(`📌 ${maxCategory[0]} concentra ${((maxCategory[1]/weekData.total)*100).toFixed(1)}% del gasto. Muy alto.`);
                }

                if (weekData.total > 500) {
                    suggestions.push(`⚠️ Semana cara: $${weekData.total.toFixed(2)}. Promedio diario: $${weekAvg}. Reduce gastos innecesarios.`);
                }

                html += `
                    <div style="background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; border-left: 5px solid #0052cc; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                        <div style="margin-bottom: 16px;">
                            <div style="font-size: 13px; color: #666; margin-bottom: 6px;">📅 ${weekData.weekStart} a ${weekData.weekEnd}</div>
                            <div style="font-size: 28px; font-weight: 700; color: #0052cc;">$${weekData.total.toFixed(2)}</div>
                            <div style="font-size: 12px; color: #999; margin-top: 4px;">Promedio diario: $${weekAvg}</div>
                        </div>
                        
                        <div style="background: #f5f5f5; padding: 12px; border-radius: 8px; margin-bottom: 12px;">
                            <div style="font-size: 12px; font-weight: 600; color: #333; margin-bottom: 12px;">Gastos por categoría:</div>
                            ${Object.entries(weekData.categories)
                                .sort((a, b) => b[1] - a[1])
                                .map(([cat, amt]) => {
                                    const pct = weekData.total > 0 ? ((amt / weekData.total) * 100).toFixed(1) : 0;
                                    return `
                                        <div style="margin-bottom: 10px;">
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px;">
                                                <span style="font-weight: 500;">${cat}</span>
                                                <span style="font-weight: 700; color: #0052cc;">$${amt.toFixed(2)} (${pct}%)</span>
                                            </div>
                                            <div style="background: white; height: 6px; border-radius: 3px; overflow: hidden;">
                                                <div style="background: linear-gradient(90deg, #0052cc, #003d99); height: 100%; width: ${pct}%; border-radius: 3px;"></div>
                                            </div>
                                        </div>
                                    `;
                                })
                                .join('')}
                        </div>

                        ${suggestions.length > 0 ? `
                            <div style="background: #fff8dc; padding: 12px; border-radius: 6px; border-left: 3px solid #ffd700;">
                                ${suggestions.map(s => `<div style="font-size: 12px; color: #333; margin-bottom: 6px; line-height: 1.4;">💡 ${s}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            document.getElementById('weeklyBreakdown').innerHTML = html;
        }

        function renderMonths() {
            // Actualizar header con mes seleccionado
            document.getElementById('currentMonth').textContent = `${monthNames[selectedMonth]} ${selectedYear}`;
            
            // Filtrar gastos del mes seleccionado
            const monthExpenses = expenses.filter(e => {
                try {
                    const parts = e.date.split('/');
                    const expenseDate = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
                    return expenseDate.getMonth() === selectedMonth && expenseDate.getFullYear() === selectedYear;
                } catch (err) {
                    return false;
                }
            });

            if (monthExpenses.length === 0) {
                document.getElementById('monthlyBreakdown').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><p>Sin gastos en este mes</p></div>';
                return;
            }

            // Calcular totales
            const monthTotal = Math.round(monthExpenses.reduce((sum, e) => sum + e.amount, 0) * 100) / 100;
            const antTotal = Math.round(monthExpenses.filter(e => 
                e.category !== 'Transporte' && 
                e.category !== 'Apps' && 
                e.category !== 'Comidas fuera'
            ).reduce((sum, e) => sum + e.amount, 0) * 100) / 100;
            
            const mealOutTotal = monthExpenses.filter(e => e.category === 'Comidas fuera').reduce((sum, e) => sum + e.amount, 0);
            const dailyAvg = (monthTotal / 30).toFixed(2);

            // Agrupar por categoría
            const byCategory = {};
            monthExpenses.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            // Agrupar por semana dentro del mes
            const byWeek = {};
            monthExpenses.forEach(e => {
                const weekKey = e.weekKey || 'sin-semana';
                if (!byWeek[weekKey]) {
                    byWeek[weekKey] = {
                        weekStart: e.weekStart,
                        weekEnd: e.weekEnd,
                        total: 0,
                        expenses: []
                    };
                }
                byWeek[weekKey].total += e.amount;
                byWeek[weekKey].expenses.push(e);
            });

            const sortedWeeks = Object.entries(byWeek).sort((a, b) => {
                if (a[0] === 'sin-semana') return 1;
                if (b[0] === 'sin-semana') return -1;
                return new Date(b[1].weekStart) - new Date(a[1].weekStart);
            });

            let html = `
                <div style="background: white; padding: 14px; border-radius: 10px; margin-bottom: 14px; border-left: 4px solid #0052cc;">
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px;">
                        <div style="text-align: center;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">Total gastado</div>
                            <div style="font-size: 20px; font-weight: 700; color: #0052cc;">$${monthTotal.toFixed(2)}</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">Promedio diario</div>
                            <div style="font-size: 20px; font-weight: 700; color: #003d99;">$${dailyAvg}</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 12px; color: #999; margin-bottom: 4px;">Total gastos</div>
                            <div style="font-size: 20px; font-weight: 700; color: #333;">${monthExpenses.length}</div>
                        </div>
                    </div>
                </div>

                <div style="background: white; padding: 14px; border-radius: 10px; margin-bottom: 14px; border-left: 4px solid #ffd700;">
                    <div style="margin-bottom: 8px;">
                        <div style="font-weight: 600; color: #333; margin-bottom: 6px;">🐜 Gastos innecesarios: $${antTotal.toFixed(2)}</div>
                        <div style="background: #f0f0f0; height: 8px; border-radius: 4px; overflow: hidden;">
                            <div style="background: linear-gradient(90deg, #ffd700, #ffa500); height: 100%; width: ${monthTotal > 0 ? ((antTotal / monthTotal) * 100) : 0}%; border-radius: 4px;"></div>
                        </div>
                    </div>
                </div>
            `;

            if (mealOutTotal > 0) {
                html += `
                    <div style="background: white; padding: 14px; border-radius: 10px; margin-bottom: 14px; border-left: 4px solid #ffa502;">
                        <div style="margin-bottom: 8px;">
                            <div style="font-weight: 600; color: #333; margin-bottom: 6px;">🍽️ Comidas fuera de casa: $${mealOutTotal.toFixed(2)}</div>
                            <div style="font-size: 12px; color: #666;">Podrías ahorrar si te preparas la comida en casa</div>
                        </div>
                    </div>
                `;
            }

            html += `<div style="margin-bottom: 14px;">`;

            sortedWeeks.forEach(([weekKey, weekData]) => {
                const weekUniqueId = `month-week-${weekKey}`;
                const weekDisplay = weekKey === 'sin-semana' ? 'Sin información' : `${weekData.weekStart} al ${weekData.weekEnd}`;
                
                html += `
                    <div style="background: white; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #0052cc; overflow: hidden;">
                        <div style="padding: 10px 14px; cursor: pointer; background: #f5f5f5; display: flex; justify-content: space-between;" onclick="toggleMonthWeek('${weekUniqueId}')">
                            <span style="font-size: 13px; font-weight: 600;">📅 ${weekDisplay}</span>
                            <span style="font-weight: 700; color: #0052cc;">$${weekData.total.toFixed(2)}</span>
                        </div>
                        <div id="${weekUniqueId}" style="display: none; padding: 0;">
                `;

                // Agrupar por día en la semana
                const byDay = {};
                weekData.expenses.forEach(e => {
                    if (!byDay[e.date]) {
                        byDay[e.date] = {
                            dayName: e.dayName,
                            total: 0,
                            expenses: []
                        };
                    }
                    byDay[e.date].total += e.amount;
                    byDay[e.date].expenses.push(e);
                });

                Object.entries(byDay).sort((a, b) => new Date(b[0]) - new Date(a[0])).forEach(([date, dayData]) => {
                    const dayUniqueId = `month-day-${weekKey}-${date}`;
                    
                    html += `
                        <div style="border-bottom: 1px solid #eee;">
                            <div style="padding: 8px 12px; background: #fafafa; cursor: pointer; display: flex; justify-content: space-between;" onclick="toggleMonthDay('${dayUniqueId}')">
                                <span style="font-size: 12px; font-weight: 600;">📅 ${dayData.dayName || ''} • ${date}</span>
                                <span style="font-size: 12px; font-weight: 600; color: #0052cc;">$${dayData.total.toFixed(2)}</span>
                            </div>
                            <div id="${dayUniqueId}" style="display: none;">
                    `;

                    dayData.expenses.forEach(e => {
                        let itemStyle = 'border-left: 3px solid #ddd; background: white;';
                        if (e.category === 'Comidas fuera') {
                            itemStyle = 'border-left: 3px solid #ffa502; background: #fff5e6;';
                        } else if (e.category !== 'Transporte' && e.category !== 'Apps') {
                            itemStyle = 'border-left: 3px solid #ffd700; background: #fffef0;';
                        }

                        html += `
                            <div style="padding: 10px 12px; ${itemStyle}">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 2px;">
                                    <span style="font-weight: 600; color: #333; font-size: 12px;">${e.description || '(sin descripción)'}</span>
                                    <span style="color: #0052cc; font-weight: 700; font-size: 12px;">$${e.amount.toFixed(2)}</span>
                                </div>
                                <div style="font-size: 11px; color: #999;">En ${e.category}</div>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            document.getElementById('monthlyBreakdown').innerHTML = html;
        }

        function previousMonth() {
            selectedMonth--;
            if (selectedMonth < 0) {
                selectedMonth = 11;
                selectedYear--;
            }
            renderMonths();
        }

        function nextMonth() {
            selectedMonth++;
            if (selectedMonth > 11) {
                selectedMonth = 0;
                selectedYear++;
            }
            renderMonths();
        }

        function toggleMonthWeek(weekId) {
            const elem = document.getElementById(weekId);
            if (elem) {
                elem.style.display = elem.style.display === 'none' ? 'block' : 'none';
            }
        }

        function toggleMonthDay(dayId) {
            const elem = document.getElementById(dayId);
            if (elem) {
                elem.style.display = elem.style.display === 'none' ? 'block' : 'none';
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            
            // Buscar el tab que corresponde al tabName y marcarlo como activo
            document.querySelectorAll('.tab').forEach(tab => {
                if (tab.textContent.toLowerCase().includes('gráfico') && tabName === 'gráfico') {
                    tab.classList.add('active');
                } else if (tab.textContent.toLowerCase().includes('categoría') && tabName === 'categorías') {
                    tab.classList.add('active');
                } else if (tab.textContent.toLowerCase().includes('mes') && tabName === 'meses') {
                    tab.classList.add('active');
                } else if (tab.textContent.toLowerCase().includes('historial') && tabName === 'lista') {
                    tab.classList.add('active');
                }
            });
            
            const tabContent = document.getElementById(tabName);
            if (tabContent) {
                tabContent.classList.add('active');
            }
        }

        function exportCSV() {
            if (expenses.length === 0) {
                alert('No hay gastos para exportar');
                return;
            }

            let csv = 'Fecha,Categoría,Descripción,Monto\n';
            expenses.forEach(e => {
                csv += `"${e.date}","${e.category}","${e.description || ''}","${e.amount}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gastos_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function openDataModal() {
            document.getElementById('dataModal').style.display = 'flex';
        }

        function closeDataModal() {
            document.getElementById('dataModal').style.display = 'none';
        }

        function confirmClearData() {
            closeDataModal();
            
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'confirmOverlay';
            
            overlay.innerHTML = `
                <div class="confirmation-dialog">
                    <h3>⚠️ Borrar TODO</h3>
                    <p>¿Estás seguro? Se eliminarán todos tus ${expenses.length} gastos registrados. Esta acción NO se puede deshacer.</p>
                    <div class="confirmation-buttons">
                        <button class="btn-cancel" onclick="cancelClear()">Cancelar</button>
                        <button class="btn-confirm" onclick="executeClear()">Borrar TODO</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
        }

        function cancelClear() {
            const overlay = document.getElementById('confirmOverlay');
            if (overlay) overlay.remove();
        }

        function executeClear() {
            expenses = [];
            saveData();
            const overlay = document.getElementById('confirmOverlay');
            if (overlay) overlay.remove();
            openDataModal();
            setTimeout(() => {
                alert('✅ Datos eliminados correctamente');
                closeDataModal();
            }, 300);
        }

        // Cerrar modal al hacer click afuera
        const dataModal = document.getElementById('dataModal');
        if (dataModal) {
            dataModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeDataModal();
                }
            });
        }

        // Permitir Enter para agregar
        const amountInput = document.getElementById('amount');
        const descriptionInput = document.getElementById('description');
        
        if (amountInput) {
            amountInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') addExpense();
            });
        }
        
        if (descriptionInput) {
            descriptionInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') addExpense();
            });
        }

        // Cargar datos al iniciar
        render();
    </script>
</body>
</html>
