<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos Hormiga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1820 100%);
            min-height: 100vh;
            padding: 16px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #0052cc;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #333;
            border-bottom: 2px solid #0052cc;
            padding-bottom: 8px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        input[type="number"],
        input[type="text"],
        select {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
        }

        button {
            padding: 10px 20px;
            background: #0052cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #0043a3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-left: 8px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-box.warning {
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-name {
            font-weight: 600;
            flex: 1;
        }

        .category-amount {
            font-weight: 700;
            color: #0052cc;
            margin-right: 12px;
            min-width: 60px;
            text-align: right;
        }

        .ant-badge {
            background: #ffd700;
            color: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-left: 4px solid #0052cc;
            background: #f0f5ff;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .expense-item.ant {
            border-left-color: #ffd700;
            background: #fffef0;
        }

        .expense-info {
            flex: 1;
        }

        .expense-cat {
            font-weight: 600;
            color: #333;
        }

        .expense-desc {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .expense-date {
            font-size: 11px;
            color: #bbb;
            margin-top: 2px;
        }

        .expense-amount {
            font-weight: 700;
            color: #0052cc;
            margin-right: 8px;
            min-width: 60px;
            text-align: right;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: #ff3838;
        }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .suggestions {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .suggestions h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .suggestion-item {
            padding: 8px 0;
            font-size: 14px;
            line-height: 1.6;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0052cc 0%, #003d99 100%);
            transition: width 0.3s;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 12px 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab.active {
            color: #0052cc;
            border-bottom-color: #0052cc;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .export-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .export-buttons button {
            flex: 1;
        }

        .data-button {
            position: fixed;
            bottom: 32px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 82, 204, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }

        .data-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(0, 82, 204, 0.6);
        }

        .data-button:active {
            transform: scale(0.95);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content {
            background: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 0;
            animation: slideUp 0.3s ease-out;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h2 {
            font-size: 18px;
            margin: 0;
            color: #333;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            color: #333;
        }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .btn-export {
            padding: 14px 20px;
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.4);
        }

        .btn-danger {
            padding: 14px 20px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .confirmation-dialog {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .confirmation-dialog h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #333;
        }

        .confirmation-dialog p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .confirmation-buttons {
            display: flex;
            gap: 12px;
        }

        .confirmation-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-confirm {
            background: #ff4757;
            color: white;
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }

            input[type="number"],
            input[type="text"],
            select {
                width: 100%;
            }

            .data-button {
                bottom: 20px;
                right: 16px;
                width: 52px;
                height: 52px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Control de Gastos</h1>
            <p class="subtitle">Identifica gastos hormiga y ahorra dinero</p>
        </header>

        <div class="card">
            <h2>➕ Registrar gasto</h2>
            <div class="input-group">
                <input type="number" id="amount" placeholder="Monto ($)" step="0.01" min="0">
                <select id="category">
                    <option value="Café">☕ Café</option>
                    <option value="Comida rápida">🍔 Comida rápida</option>
                    <option value="Apps">📱 Suscripciones</option>
                    <option value="Comidas fuera">🍽️ Comidas fuera de casa</option>
                    <option value="Golosinas">🍬 Golosinas</option>
                    <option value="Transporte">🚕 Transporte</option>
                    <option value="Entretenimiento">🎬 Entretenimiento</option>
                    <option value="Apuestas">🎲 Apuestas en línea</option>
                    <option value="Propinas">💵 Propinas</option>
                    <option value="Otro">📌 Otro</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="description" placeholder="Descripción (ej: Venti Starbucks)">
                <button onclick="addExpense()">Agregar</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total gastado</div>
                <div class="stat-value" id="totalSpent">$0</div>
            </div>
            <div class="stat-box warning">
                <div class="stat-label">Gastos hormiga (&lt;$5)</div>
                <div class="stat-value" id="antSpent">$0</div>
            </div>
        </div>

        <div class="card" id="suggestionsCard" style="display: none;">
            <div class="suggestions" id="suggestionsContent"></div>
        </div>

        <div class="card">
            <h2>📊 Análisis</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('gráfico')">Gráfico</button>
                <button class="tab" onclick="switchTab('categorías')">Por categoría</button>
                <button class="tab" onclick="switchTab('semanas')">Por semana</button>
                <button class="tab" onclick="switchTab('lista')">Historial</button>
            </div>

            <div id="gráfico" class="tab-content active">
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div id="categorías" class="tab-content">
                <div id="categoryBreakdown"></div>
            </div>

            <div id="semanas" class="tab-content">
                <div id="weeklyBreakdown"></div>
            </div>

            <div id="lista" class="tab-content">
                <div id="expenseList"></div>
            </div>
        </div>

        <button class="data-button" onclick="openDataModal()">⚙️</button>
    </div>

    <!-- Modal de Datos -->
    <div id="dataModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💾 Gestionar datos</h2>
                <button class="close-modal" onclick="closeDataModal()">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-info">Opciones para tu información</p>
                <button class="btn-export" onclick="exportCSV()">📥 Descargar datos (CSV)</button>
                <button class="btn-danger" onclick="confirmClearData()">🗑️ Borrar TODO</button>
            </div>
        </div>
    </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
        let chart = null;

        function getWeekInfo(date = new Date()) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Ajusta al lunes
            const monday = new Date(d.setDate(diff));
            const sunday = new Date(monday);
            sunday.setDate(sunday.getDate() + 6);
            
            const weekStart = monday.toLocaleDateString('es-MX');
            const weekEnd = sunday.toLocaleDateString('es-MX');
            const weekKey = monday.toISOString().split('T')[0]; // YYYY-MM-DD del lunes
            
            return { weekStart, weekEnd, weekKey, monday, sunday };
        }

        function getDayName(date) {
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            return days[new Date(date).getDay()];
        }

        function addExpense() {
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            if (!amount || amount <= 0) {
                alert('Por favor ingresa un monto válido');
                return;
            }

            const today = new Date();
            const dayName = getDayName(today);
            const weekInfo = getWeekInfo(today);

            expenses.unshift({
                id: Date.now(),
                amount,
                category,
                description,
                date: today.toLocaleDateString('es-MX'),
                dayName,
                weekKey: weekInfo.weekKey,
                weekStart: weekInfo.weekStart,
                weekEnd: weekInfo.weekEnd
            });

            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            saveData();
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            saveData();
        }

        function saveData() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            render();
        }

        function render() {
            renderStats();
            renderSuggestions();
            renderChart();
            renderCategories();
            renderWeekly();
            renderList();
        }

        function renderStats() {
            const total = Math.round(expenses.reduce((sum, e) => sum + e.amount, 0) * 100) / 100;
            const antTotal = Math.round(expenses.filter(e => e.amount < 5).reduce((sum, e) => sum + e.amount, 0) * 100) / 100;

            document.getElementById('totalSpent').textContent = '$' + total.toFixed(2);
            document.getElementById('antSpent').textContent = '$' + antTotal.toFixed(2);
        }

        function renderSuggestions() {
            if (expenses.length === 0) {
                document.getElementById('suggestionsCard').style.display = 'none';
                return;
            }

            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            const antTotal = expenses.filter(e => e.amount < 5).reduce((sum, e) => sum + e.amount, 0);
            const antPercent = ((antTotal / total) * 100).toFixed(1);

            const byCategory = {};
            expenses.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            const topCategory = Object.entries(byCategory).sort((a, b) => b[1] - a[1])[0];
            const topCategoryPercent = ((topCategory[1] / total) * 100).toFixed(1);

            let suggestions = [];

            if (antPercent > 15) {
                suggestions.push(`🐜 <strong>ALERTA GASTOS HORMIGA:</strong> ${antPercent}% de tu dinero va en gastos pequeños. Si reduces esto a 5%, ahorras $${(antTotal * 0.7).toFixed(2)} al mes.`);
            }

            if (topCategoryPercent > 30) {
                suggestions.push(`📌 <strong>${topCategory[0]} es tu mayor gasto:</strong> ${topCategoryPercent}% de todo. Intenta reducirlo 20% y tendrás $${(topCategory[1] * 0.2).toFixed(2)} extra.`);
            }

            if (expenses.filter(e => e.category === 'Café').length > 5) {
                const coffeeTotal = expenses.filter(e => e.category === 'Café').reduce((sum, e) => sum + e.amount, 0);
                suggestions.push(`☕ <strong>Hábito de café detectado:</strong> Gastas $${coffeeTotal.toFixed(2)}. ¿Y si haces café en casa? Ahorras ~70%.`);
            }

            if (expenses.filter(e => e.category === 'Apps').length > 0) {
                const appsTotal = expenses.filter(e => e.category === 'Apps').reduce((sum, e) => sum + e.amount, 0);
                suggestions.push(`📱 <strong>Revisa tus suscripciones:</strong> Pagas $${appsTotal.toFixed(2)}. Cancela las que no usas.`);
            }

            if (expenses.filter(e => e.category === 'Apuestas').length > 0) {
                const betsTotal = expenses.filter(e => e.category === 'Apuestas').reduce((sum, e) => sum + e.amount, 0);
                const betsCount = expenses.filter(e => e.category === 'Apuestas').length;
                const betsPercent = ((betsTotal / total) * 100).toFixed(1);
                suggestions.push(`🎲 <strong>¡ALERTA APUESTAS!</strong> Has gastado $${betsTotal.toFixed(2)} en ${betsCount} apuestas (${betsPercent}% de tu total). Esto es un gasto de alto riesgo. Considera detenerte completamente.`);
            }

            if (expenses.filter(e => e.category === 'Golosinas').length > 5) {
                const candyTotal = expenses.filter(e => e.category === 'Golosinas').reduce((sum, e) => sum + e.amount, 0);
                suggestions.push(`🍬 <strong>Golosinas frecuentes:</strong> Gastas $${candyTotal.toFixed(2)} en dulces. Ahorrarías mucho reduciéndolas a 1-2 veces por semana.`);
            }

            if (expenses.filter(e => e.category === 'Propinas').length > 0) {
                const tipsTotal = expenses.filter(e => e.category === 'Propinas').reduce((sum, e) => sum + e.amount, 0);
                const tipsPercent = ((tipsTotal / total) * 100).toFixed(1);
                if (tipsPercent > 10) {
                    suggestions.push(`💵 <strong>Propinas elevadas:</strong> ${tipsPercent}% de tu gasto total ($${tipsTotal.toFixed(2)}). Revisa si todas son necesarias.`);
                }
            }

            if (suggestions.length > 0) {
                document.getElementById('suggestionsCard').style.display = 'block';
                document.getElementById('suggestionsContent').innerHTML = suggestions
                    .map(s => `<div class="suggestion-item">💡 ${s}</div>`)
                    .join('');
            } else {
                document.getElementById('suggestionsCard').style.display = 'none';
            }
        }

        function renderChart() {
            const byCategory = {};
            expenses.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            const ctx = document.getElementById('categoryChart');
            
            if (chart) {
                chart.destroy();
            }

            if (Object.keys(byCategory).length === 0) {
                ctx.parentElement.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>Agrega gastos para ver el gráfico</p></div>';
                return;
            }

            const colors = [
                '#0052cc', '#003d99', '#1e40af', '#1e3a8a', '#0f172a', '#64748b', '#475569', '#334155'
            ];

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(byCategory),
                    datasets: [{
                        data: Object.values(byCategory),
                        backgroundColor: colors,
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 12 },
                                padding: 15,
                                usePointStyle: true
                            }
                        }
                    }
                }
            });
        }

        function renderCategories() {
            const byCategory = {};
            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            
            expenses.forEach(e => {
                byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
            });

            if (total === 0) {
                document.getElementById('categoryBreakdown').innerHTML = '<div class="empty-state"><p>Sin categorías registradas</p></div>';
                return;
            }

            const sorted = Object.entries(byCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, amt]) => {
                    const rounded = Math.round(amt * 100) / 100;
                    const pct = Math.round((amt / total) * 100);
                    return `
                        <div class="category-item">
                            <div class="category-name">${cat}</div>
                            <div class="category-amount">$${rounded.toFixed(2)}</div>
                            <div style="color: #667eea; font-weight: 600; min-width: 40px; text-align: right;">${pct}%</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${pct}%"></div>
                        </div>
                    `;
                }).join('');

            document.getElementById('categoryBreakdown').innerHTML = sorted;
        }

        function renderList() {
            if (expenses.length === 0) {
                document.getElementById('expenseList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>Sin gastos registrados</p></div>';
                return;
            }

            const list = expenses.map(e => {
                const isAnt = e.amount < 5 ? ' ant' : '';
                let dayName = e.dayName;
                
                if (!dayName) {
                    try {
                        const parts = e.date.split('/');
                        const dateObj = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
                        dayName = getDayName(dateObj);
                    } catch (err) {
                        dayName = '';
                    }
                }
                
                return `
                    <div class="expense-item${isAnt}">
                        <div class="expense-info">
                            <div class="expense-cat">${e.category} ${e.amount < 5 ? '🐜' : ''}</div>
                            ${e.description ? `<div class="expense-desc">${e.description}</div>` : ''}
                            <div class="expense-date">${dayName ? dayName + ' • ' : ''}${e.date}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="expense-amount">$${e.amount.toFixed(2)}</div>
                            <button class="delete-btn" onclick="deleteExpense(${e.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('expenseList').innerHTML = list;
        }

        function renderWeekly() {
            if (expenses.length === 0) {
                document.getElementById('weeklyBreakdown').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><p>Sin gastos para analizar por semana</p></div>';
                return;
            }

            // Agrupar gastos por semana
            const byWeek = {};
            expenses.forEach(e => {
                let weekKey = e.weekKey;
                let weekStart = e.weekStart;
                let weekEnd = e.weekEnd;
                
                // Si no tiene información de semana (datos antiguos), calcularla
                if (!weekKey) {
                    try {
                        const parts = e.date.split('/');
                        const dateObj = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
                        const weekInfo = getWeekInfo(dateObj);
                        weekKey = weekInfo.weekKey;
                        weekStart = weekInfo.weekStart;
                        weekEnd = weekInfo.weekEnd;
                    } catch (err) {
                        console.warn('Error procesando fecha:', e.date);
                        return;
                    }
                }
                
                if (!byWeek[weekKey]) {
                    byWeek[weekKey] = {
                        weekStart: weekStart,
                        weekEnd: weekEnd,
                        total: 0,
                        expenses: [],
                        categories: {}
                    };
                }
                byWeek[weekKey].total += e.amount;
                byWeek[weekKey].expenses.push(e);
                byWeek[weekKey].categories[e.category] = (byWeek[weekKey].categories[e.category] || 0) + e.amount;
            });

            // Ordenar semanas de más reciente a más antigua
            const sortedWeeks = Object.entries(byWeek)
                .sort((a, b) => new Date(b[0]) - new Date(a[0]));

            let html = '';

            sortedWeeks.forEach(([weekKey, weekData]) => {
                const antCount = weekData.expenses.filter(e => e.amount < 5).length;
                const antTotal = weekData.expenses.filter(e => e.amount < 5).reduce((sum, e) => sum + e.amount, 0);
                const maxCategory = Object.entries(weekData.categories).sort((a, b) => b[1] - a[1])[0];
                const weekAvg = (weekData.total / 7).toFixed(2);

                let suggestions = [];
                
                if (weekData.total > 0 && antTotal / weekData.total > 0.15) {
                    suggestions.push(`🐜 Gastos hormiga: $${antTotal.toFixed(2)} (${((antTotal/weekData.total)*100).toFixed(1)}%). Intenta reducirlo.`);
                }
                
                if (maxCategory && weekData.total > 0 && (maxCategory[1] / weekData.total) > 0.35) {
                    suggestions.push(`📌 ${maxCategory[0]} concentra ${((maxCategory[1]/weekData.total)*100).toFixed(1)}% del gasto. Muy alto.`);
                }

                if (weekData.total > 500) {
                    suggestions.push(`⚠️ Semana cara: $${weekData.total.toFixed(2)}. Promedio diario: $${weekAvg}. Reduce gastos innecesarios.`);
                }

                html += `
                    <div style="background: var(--surface-1); border-radius: 8px; padding: 16px; margin-bottom: 16px; border-left: 4px solid #0052cc;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <div>
                                <div style="font-size: 14px; color: #666; margin-bottom: 4px;">📅 ${weekData.weekStart} a ${weekData.weekEnd}</div>
                                <div style="font-size: 20px; font-weight: 700; color: #0052cc;">$${weekData.total.toFixed(2)}</div>
                                <div style="font-size: 12px; color: #999;">Promedio diario: $${weekAvg}</div>
                            </div>
                            <div style="text-align: right; font-size: 28px; opacity: 0.3;">📊</div>
                        </div>
                        
                        <div style="background: white; padding: 12px; border-radius: 6px; margin-bottom: 12px; max-height: 120px; overflow-y: auto;">
                            ${Object.entries(weekData.categories)
                                .sort((a, b) => b[1] - a[1])
                                .map(([cat, amt]) => {
                                    const pct = weekData.total > 0 ? ((amt / weekData.total) * 100).toFixed(1) : 0;
                                    return `
                                        <div style="display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 12px;">
                                            <span>${cat}</span>
                                            <span style="font-weight: 600;">$${amt.toFixed(2)} (${pct}%)</span>
                                        </div>
                                    `;
                                })
                                .join('')}
                        </div>

                        ${suggestions.length > 0 ? `
                            <div style="background: #fff8dc; padding: 12px; border-radius: 6px; border-left: 3px solid #ffd700;">
                                ${suggestions.map(s => `<div style="font-size: 12px; color: #333; margin-bottom: 6px; line-height: 1.4;">💡 ${s}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            document.getElementById('weeklyBreakdown').innerHTML = html;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function exportCSV() {
            if (expenses.length === 0) {
                alert('No hay gastos para exportar');
                return;
            }

            let csv = 'Fecha,Categoría,Descripción,Monto\n';
            expenses.forEach(e => {
                csv += `"${e.date}","${e.category}","${e.description || ''}","${e.amount}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gastos_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function openDataModal() {
            document.getElementById('dataModal').style.display = 'flex';
        }

        function closeDataModal() {
            document.getElementById('dataModal').style.display = 'none';
        }

        function confirmClearData() {
            closeDataModal();
            
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'confirmOverlay';
            
            overlay.innerHTML = `
                <div class="confirmation-dialog">
                    <h3>⚠️ Borrar TODO</h3>
                    <p>¿Estás seguro? Se eliminarán todos tus ${expenses.length} gastos registrados. Esta acción NO se puede deshacer.</p>
                    <div class="confirmation-buttons">
                        <button class="btn-cancel" onclick="cancelClear()">Cancelar</button>
                        <button class="btn-confirm" onclick="executeClear()">Borrar TODO</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
        }

        function cancelClear() {
            const overlay = document.getElementById('confirmOverlay');
            if (overlay) overlay.remove();
        }

        function executeClear() {
            expenses = [];
            saveData();
            const overlay = document.getElementById('confirmOverlay');
            if (overlay) overlay.remove();
            openDataModal();
            setTimeout(() => {
                alert('✅ Datos eliminados correctamente');
                closeDataModal();
            }, 300);
        }

        // Cerrar modal al hacer click afuera
        const dataModal = document.getElementById('dataModal');
        if (dataModal) {
            dataModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeDataModal();
                }
            });
        }

        // Permitir Enter para agregar
        const amountInput = document.getElementById('amount');
        const descriptionInput = document.getElementById('description');
        
        if (amountInput) {
            amountInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') addExpense();
            });
        }
        
        if (descriptionInput) {
            descriptionInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') addExpense();
            });
        }

        // Cargar datos al iniciar
        render();
    </script>
</body>
</html>
